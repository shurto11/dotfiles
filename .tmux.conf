# コピーモードをvi化
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi V send-keys -X select-line
set -s set-clipboard off

# ペイン移動をvi化
set -sg escape-time 0
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインのリサイズをvi化
bind -r H resize-pane -L 5 
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ウィンドウの順番入れ替え
bind -r Left swap-window -t -1\; select-window -t -1
bind -r Right swap-window -t +1\; select-window -t +1

# ウィンドウペイン色
set -g window-style 'bg=color236,fg=color248'
set -g window-active-style 'bg=black,fg=white'

# ペイン分割時に同一ディレクトリで
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'

# ステータスバー（uim-fepのステータス行と干渉しないよう上に配置）
set -g status-position top
set -g status-style 'bg=color028,fg=color254'
set -g window-status-current-style 'bg=color236,fg=color231'

# IMEモード表示（左側に目立つように）
set -g status-left-length 20
set -g status-left '#(get_ime_mode) '
set -g status-interval 1

set -g status-right-length 150
set-option -g status-right '#(get_cputemp_tmux)| #(get_mem_tmux)| #(get_wifi_tmux)| #(get_battery_tmux)| %H:%M | %y/%m/%d %a '

set-environment -g PATH "$HOME/bin:/usr/local/bin:/usr/bin:/bin"

# 日本語（ワイド文字）の表示ずれ対策
set -g allow-passthrough on
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# IME監視スクリプトを自動起動（重複防止）
run-shell 'pgrep -f "ime_watcher" >/dev/null || nohup ~/bin/ime_watcher >/dev/null 2>&1 &'

# マウス有効化
set -g mouse on
